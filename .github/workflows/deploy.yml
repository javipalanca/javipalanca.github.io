name: Test Build Integration GitHub Pages

on:
  push:
    branches: "test-integration"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout SPADE LLM Docs
        uses: actions/checkout@v4
        with:
          repository: javipalanca/spade_llm
          ref: gh-pages-test
          path: tmp/docs/spade_llm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "./package-lock.json"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build
      
      - name: Copy SPADE LLM Docs
        run: |
          mkdir -p ./dist/docs/spade_llm/
          cp -r tmp/docs/spade_llm/* dist/docs/spade_llm/
          rm -rf dist/docs/spade_llm/.git
          echo "Copied SPADE LLM docs to dist/docs/spade_llm/, listing contents:"
          ls -la dist/docs/spade_llm/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

