name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Set true to publish to GitHub Pages"
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types: [update-spade-docs-event, update-spade-llm-docs-event]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Astro (main site)
        uses: actions/checkout@v6
      
      - name: Checkout SPADE LLM Docs
        uses: actions/checkout@v6
        with:
          repository: javipalanca/spade_llm
          ref: gh-pages
          path: tmp/docs/spade_llm

      - name: Checkout SPADE Docs
        uses: actions/checkout@v6
        with:
          repository: javipalanca/spade
          ref: gh-pages
          path: tmp/docs/spade

      # Build Astro (main site)
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "./package-lock.json"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build
      
      - name: Inject SPADE LLM Docs
        run: |
          mkdir -p dist/docs/spade_llm
          cp -r tmp/docs/spade_llm/* dist/docs/spade_llm/

      - name: Inject SPADE Docs (stable and develop)
        run: |
          mkdir -p dist/docs/spade dist/docs/spade/develop
          if [ -d tmp/docs/spade/stable ]; then
            cp -r tmp/docs/spade/stable/* dist/docs/spade/
          fi
          if [ -d tmp/docs/spade/develop ]; then
            cp -r tmp/docs/spade/develop/* dist/docs/spade/develop/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    if: github.event_name == 'push' || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
